<!DOCTYPE html>
<html>
<head>
    <title>Re-enable Admin User</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .success { color: green; }
        .error { color: red; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Re-enable Admin User</h1>
        <p>This tool will re-enable the admin user (admin@nexusims.com) if it was accidentally disabled.</p>

        <button onclick="reEnableAdmin()">Re-enable Admin User</button>

        <h2>Manual Method (Browser Console)</h2>
        <p>If the button doesn't work, you can run this code in your browser's developer console:</p>
        <pre id="consoleCode"></pre>

        <div id="result"></div>
    </div>

    <script>
        // Display the console code
        document.getElementById('consoleCode').textContent = `
(function() {
  try {
    const usersKey = 'ims_users_v1';
    const usersData = localStorage.getItem(usersKey);

    if (!usersData) {
      console.log('No users data found in localStorage');
      return;
    }

    const users = JSON.parse(usersData);
    const adminUser = users.find(user => user.email === 'admin@nexusims.com');

    if (!adminUser) {
      console.log('Admin user not found');
      return;
    }

    if (adminUser.status === 'ACTIVE') {
      console.log('Admin user is already active');
      return;
    }

    adminUser.status = 'ACTIVE';
    adminUser.last_active_at = new Date().toISOString();

    localStorage.setItem(usersKey, JSON.stringify(users));
    localStorage.setItem('ims_authenticated_user_id_v1', adminUser.id);
    localStorage.setItem('ims_current_user_id_v1', adminUser.id);

    console.log('✅ Admin user re-enabled successfully!');
    console.log('Updated admin user:', adminUser);

    setTimeout(() => {
      window.location.reload();
    }, 1000);

  } catch (error) {
    console.error('Error re-enabling admin user:', error);
  }
})();
        `.trim();

        function reEnableAdmin() {
            const resultDiv = document.getElementById('result');

            try {
                // Get current users from localStorage
                const usersKey = 'ims_users_v1';
                const usersData = localStorage.getItem(usersKey);

                if (!usersData) {
                    resultDiv.innerHTML = '<p class="error">❌ No users data found in localStorage</p>';
                    return;
                }

                const users = JSON.parse(usersData);
                const adminUser = users.find(user => user.email === 'admin@nexusims.com');

                if (!adminUser) {
                    resultDiv.innerHTML = '<p class="error">❌ Admin user not found</p>';
                    return;
                }

                if (adminUser.status === 'ACTIVE') {
                    resultDiv.innerHTML = '<p class="success">✅ Admin user is already active</p>';
                    return;
                }

                // Update admin user status to ACTIVE
                adminUser.status = 'ACTIVE';
                adminUser.last_active_at = new Date().toISOString();

                // Save back to localStorage
                localStorage.setItem(usersKey, JSON.stringify(users));
                localStorage.setItem('ims_authenticated_user_id_v1', adminUser.id);
                localStorage.setItem('ims_current_user_id_v1', adminUser.id);

                resultDiv.innerHTML = `
                    <p class="success">✅ Admin user re-enabled successfully!</p>
                    <p><strong>User Details:</strong></p>
                    <ul>
                        <li>Name: ${adminUser.full_name}</li>
                        <li>Email: ${adminUser.email}</li>
                        <li>Role: ${adminUser.role_name}</li>
                        <li>Status: ${adminUser.status}</li>
                    </ul>
                    <p>The page will reload in 2 seconds...</p>
                `;

                // Reload the page to apply changes
                setTimeout(() => {
                    window.location.href = 'http://localhost:3001/login';
                }, 2000);

            } catch (error) {
                resultDiv.innerHTML = `<p class="error">❌ Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
